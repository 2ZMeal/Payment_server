global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spring-services'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:19081
          - company-service:19082
          - product-service:19083
          - cart-service:19084
          - order-service:19085
          - payment-service:19086
          - shipment-service:19087
          - notification-service:19088
          - review-service:19089
          - customer-service:19090
          - config-server:8888
          - eureka-server:8761
          - api-gateway:8080

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
