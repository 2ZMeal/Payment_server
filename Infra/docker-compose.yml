services:

  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    profiles: [infra]
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7
    container_name: redis
    profiles: [infra]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper ───────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    profiles: [infra]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    profiles: [infra]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafdrop (Kafka UI) ───────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    profiles: [infra]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092

  # ── Keycloak ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    profiles: [infra]
    command: start-dev
    env_file: .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/postgres
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Config Server ────────────────────────────────────
  config-server:
    image: dosirak/config-server:latest
    container_name: config-server
    profiles: [platform]
    env_file: .env
    ports:
      - "8888:8888"
    volumes:
      - ./config:/config
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Eureka Server ─────────────────────────────────────
  eureka-server:
    image: dosirak/eureka-server:latest
    container_name: eureka-server
    profiles: [platform]
    environment:
      EUREKA_HOSTNAME: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── API Gateway ───────────────────────────────────────
  api-gateway:
    image: dosirak/api-gateway:latest
    container_name: api-gateway
    profiles: [platform]
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Domain Services (app profile) ────────────────────
  user-service:
    image: dosirak/user-service:latest
    container_name: user-service
    profiles: [app]
    ports:
      - "19081:19081"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  company-service:
    image: dosirak/company-service:latest
    container_name: company-service
    profiles: [app]
    ports:
      - "19082:19082"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  product-service:
    image: dosirak/product-service:latest
    container_name: product-service
    profiles: [app]
    ports:
      - "19083:19083"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  cart-service:
    image: dosirak/cart-service:latest
    container_name: cart-service
    profiles: [app]
    ports:
      - "19084:19084"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    image: dosirak/order-service:latest
    container_name: order-service
    profiles: [app]
    ports:
      - "19085:19085"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    image: dosirak/payment-service:latest
    container_name: payment-service
    profiles: [app]
    ports:
      - "19086:19086"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  shipment-service:
    image: dosirak/shipment-service:latest
    container_name: shipment-service
    profiles: [app]
    ports:
      - "19087:19087"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    image: dosirak/notification-service:latest
    container_name: notification-service
    profiles: [app]
    ports:
      - "19088:19088"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  review-service:
    image: dosirak/review-service:latest
    container_name: review-service
    profiles: [app]
    ports:
      - "19089:19089"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  customer-service:
    image: dosirak/customer-service:latest
    container_name: customer-service
    profiles: [app]
    ports:
      - "19090:19090"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # ── Grafana ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  # ── Zipkin ────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    profiles: [monitoring]
    ports:
      - "9411:9411"

volumes:
  postgres_data:
