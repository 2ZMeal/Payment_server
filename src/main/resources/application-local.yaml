spring:
  application:
    name: payment-service

  config:
    import: "configserver:"      # Config Server에서 설정 가져옴

  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: false
      retry:
        max-attempts: 3
        initial-interval: 1000

payment:
  toss:
    url: https://api.tosspayments.com/v1/payments
    secret-key: ${TOSS_SECRET_KEY}
    client-key: ${TOSS_CLIENT_KEY}

  nicepay:
    name: NICEPAY
    api-url: https://api.nicepay.co.kr/v1/payments
    sandbox-url: https://sandbox-api.nicepay.co.kr/v1/payments
    client-key: ${NICEPAY_CLIENT_KEY}
    secret-key: ${NICEPAY_SECRET_KEY}
    sandbox: true
